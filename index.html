<!DOCTYPE html>
<html>
<head>
    <title>Student CRUD App</title>
    <style>
:root {
    --bg-1: #0f172a;
    --bg-2: #1e3a8a;
    --bg-3: #0f766e;
    --panel: rgba(255, 255, 255, 0.82);
    --panel-border: rgba(255, 255, 255, 0.55);
    --text: #1f1147;
    --muted: #3a246c;
    --input-bg: rgba(255, 255, 255, 0.9);
    --input-border: #d9b8ff;
    --input-focus: #6d28d9;
    --add: #00d084;
    --add-hover: #00b870;
    --update: #ffbe0b;
    --update-hover: #f59e0b;
    --delete: #ff006e;
    --delete-hover: #e50063;
    --edit: #3a86ff;
    --edit-hover: #216dff;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
    background:
        radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.35) 0 8%, transparent 10%),
        radial-gradient(circle at 85% 20%, rgba(255, 255, 255, 0.25) 0 10%, transparent 12%),
        radial-gradient(circle at 20% 85%, rgba(255, 255, 255, 0.2) 0 12%, transparent 14%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2), var(--bg-3));
    color: var(--text);
    text-align: center;
    display: grid;
    place-items: start center;
    padding: 38px 16px;
}

.container {
    width: min(100%, 540px);
    margin: 0;
    background: var(--panel);
    backdrop-filter: blur(8px);
    padding: 24px;
    border-radius: 20px;
    border: 1px solid var(--panel-border);
    box-shadow: 0 18px 40px rgba(31, 17, 71, 0.28);
}

input {
    width: 100%;
    padding: 11px 12px;
    margin: 7px 0;
    border-radius: 12px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.1s ease;
}

input:focus {
    border-color: var(--input-focus);
    box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.18);
    transform: translateY(-1px);
}

button {
    padding: 9px 13px;
    margin: 6px 4px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2px;
    transition: transform 0.12s ease, box-shadow 0.18s ease, filter 0.18s ease;
}

button:hover {
    transform: translateY(-1px) scale(1.01);
    filter: saturate(1.05);
}

button:active {
    transform: translateY(0);
}

.add-btn {
    background: var(--add);
    color: #052e24;
    width: 100%;
    box-shadow: 0 8px 16px rgba(0, 208, 132, 0.35);
}

.add-btn:hover {
    background: var(--add-hover);
}

.update-btn {
    background: var(--update);
    color: #3f2200;
    width: 100%;
    box-shadow: 0 8px 16px rgba(255, 190, 11, 0.35);
}

.update-btn:hover {
    background: var(--update-hover);
}

.delete-btn {
    background: var(--delete);
    color: #fff1f6;
    box-shadow: 0 8px 16px rgba(255, 0, 110, 0.32);
}

.delete-btn:hover {
    background: var(--delete-hover);
}

.edit-btn {
    background: var(--edit);
    color: #eff6ff;
    box-shadow: 0 8px 16px rgba(58, 134, 255, 0.32);
}

.edit-btn:hover {
    background: var(--edit-hover);
}

ul {
    list-style: none;
    padding: 0;
    margin: 14px 0 0;
}

li {
    background: rgba(255, 255, 255, 0.88);
    margin: 9px 0;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.7);
    color: var(--muted);
    line-height: 1.45;
    box-shadow: 0 8px 18px rgba(58, 36, 108, 0.12);
}


    </style>
</head>
<body>

<div class="container">

    <h2>Student CRUD Application</h2>

    <input type="text" id="name" placeholder="Name">
    <input type="number" id="age" placeholder="Age">
    <input type="text" id="course" placeholder="Course">

    <button class="add-btn" onclick="addStudent()">Add Student</button>
    <button class="update-btn" onclick="updateStudent()">Update Student</button>

    <hr>

    <button onclick="getStudents()">Refresh List</button>

    <ul id="list"></ul>

</div>

<script>
let selectedId = null;
const API_BASE_URLS = window.location.origin === "http://localhost:5000"
    ? [""]
    : ["http://localhost:5000", "http://127.0.0.1:5000"];

async function fetchApi(path, options) {
    let lastError;

    for (const baseUrl of API_BASE_URLS) {
        try {
            return await fetch(baseUrl + path, options);
        } catch (error) {
            lastError = error;
        }
    }

    throw lastError || new Error("Cannot connect to API server.");
}

// ADD STUDENT
async function addStudent() {

    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let course = document.getElementById("course").value;

    if (!name || !age || !course) {
        alert("Please fill all fields.");
        return;
    }

    try {
        const response = await fetchApi("/students", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name: name,
                age: Number(age),
                course: course
            })
        });

        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.message || "Failed to add student.");
        }

        clearFields();
        await getStudents();
    } catch (error) {
        if (error.message === "Failed to fetch") {
            alert("Cannot connect to backend. Run: node server.js");
        } else {
            alert(error.message);
        }
        console.error("Add student error:", error);
    }
}


// GET STUDENTS
async function getStudents() {

    try {
        const response = await fetchApi("/students");
        if (!response.ok) {
            throw new Error("Failed to load students.");
        }
        const data = await response.json();

        var list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(function(student) {

            var li = document.createElement("li");

            li.innerHTML =
                student.name + " | " +
                student.age + " | " +
                student.course +
                "<br>" +
                "<button class='edit-btn' onclick='editStudent(\"" + student._id + "\", \"" + student.name + "\", \"" + student.age + "\", \"" + student.course + "\")'>Edit</button>" +
                "<button class='delete-btn' onclick='deleteStudent(\"" + student._id + "\")'>Delete</button>";

            list.appendChild(li);
        });
    } catch (error) {
        if (error.message === "Failed to fetch") {
            alert("Cannot connect to backend. Run: node server.js");
        } else {
            alert(error.message);
        }
        console.error("Get students error:", error);
    }
}


// EDIT STUDENT
function editStudent(id, name, age, course) {
    selectedId = id;

    document.getElementById("name").value = name;
    document.getElementById("age").value = age;
    document.getElementById("course").value = course;
}


// UPDATE STUDENT
async function updateStudent() {

    if (selectedId == null) {
        alert("Please select a student first");
        return;
    }

    var name = document.getElementById("name").value;
    var age = document.getElementById("age").value;
    var course = document.getElementById("course").value;

    try {
        const response = await fetchApi("/students/" + selectedId, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name: name,
                age: Number(age),
                course: course
            })
        });

        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.message || "Failed to update student.");
        }

        selectedId = null;
        clearFields();
        await getStudents();
    } catch (error) {
        if (error.message === "Failed to fetch") {
            alert("Cannot connect to backend. Run: node server.js");
        } else {
            alert(error.message);
        }
        console.error("Update student error:", error);
    }
}


// DELETE STUDENT
async function deleteStudent(id) {

    try {
        const response = await fetchApi("/students/" + id, {
            method: "DELETE"
        });

        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.message || "Failed to delete student.");
        }

        await getStudents();
    } catch (error) {
        if (error.message === "Failed to fetch") {
            alert("Cannot connect to backend. Run: node server.js");
        } else {
            alert(error.message);
        }
        console.error("Delete student error:", error);
    }
}


// CLEAR INPUT FIELDS
function clearFields() {
    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("course").value = "";
}


// LOAD DATA WHEN PAGE OPENS
getStudents();

</script>
</body>
</html>
